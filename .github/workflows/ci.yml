name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          # Use libaio-dev for Ubuntu 24.04 compatibility
          sudo apt-get install -y libaio-dev

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install project dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Fallback: install common deps if requirements.txt not present in root
          pip install pytest python-dotenv pandas cx_Oracle dash plotly streamlit pyarrow

      - name: Run pytest
        env:
          # Ensure tests that require Oracle credentials are skipped when not configured
          ORACLE_HOST: ""
          ORACLE_USERNAME: ""
          ORACLE_PASSWORD: ""
          ORACLE_SERVICE_NAME: ""
        run: |
          pytest -q
